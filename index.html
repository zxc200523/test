<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>掃碼診斷</title>
<style>
body { font-family: sans-serif; padding: 1rem; background: #f5f5f5; }
h2 { font-size: 18px; margin-bottom: 1rem; }
.item {
  background: #fff; border-radius: 10px; padding: 12px 16px;
  margin-bottom: 10px; display: flex; justify-content: space-between;
  align-items: center; font-size: 14px;
}
.label { color: #555; }
.val { font-weight: 500; }
.ok { color: #0a7a5a; }
.no { color: #c0392b; }
.warn { color: #b7700a; }
button {
  width: 100%; padding: 12px; background: #534AB7; color: #fff;
  border: none; border-radius: 10px; font-size: 15px; cursor: pointer;
  margin-bottom: 10px;
}
#log {
  background: #1e1e1e; color: #ccc; border-radius: 10px;
  padding: 12px; font-family: monospace; font-size: 12px;
  white-space: pre-wrap; min-height: 80px; margin-top: 10px;
}
#preview { width: 100%; border-radius: 10px; display: none; margin-top: 10px; }
input[type=file] { display: none; }
</style>
</head>
<body>
<h2>掃碼環境診斷</h2>

<div class="item">
  <span class="label">裝置 UserAgent</span>
  <span class="val" id="ua" style="font-size:11px; max-width:60%; text-align:right;"></span>
</div>
<div class="item">
  <span class="label">是否為 iOS</span>
  <span class="val" id="is-ios"></span>
</div>
<div class="item">
  <span class="label">HTTPS / localhost</span>
  <span class="val" id="is-https"></span>
</div>
<div class="item">
  <span class="label">BarcodeDetector 支援</span>
  <span class="val" id="barcode-detector"></span>
</div>
<div class="item">
  <span class="label">getUserMedia 支援</span>
  <span class="val" id="getusermedia"></span>
</div>

<button id="test-camera">測試開啟相機（即時掃描）</button>
<button id="test-photo">測試拍照解析條碼</button>
<button id="test-zxing">測試載入 ZXing 函式庫</button>

<input type="file" id="photo-input" accept="image/*" capture="environment" />
<img id="preview" />
<div id="log">診斷結果會顯示在這裡...</div>

<script>
const log = document.getElementById('log');
function addLog(msg, type) {
  const color = type === 'ok' ? '#5edc9a' : type === 'err' ? '#ff6b6b' : '#ffd97d';
  log.innerHTML += `<span style="color:${color}">${msg}</span>\n`;
  log.scrollTop = log.scrollHeight;
}

// 基本環境偵測
const ua = navigator.userAgent;
document.getElementById('ua').textContent = ua.substring(0, 80) + (ua.length > 80 ? '...' : '');

const isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
const iosEl = document.getElementById('is-ios');
iosEl.textContent = isIOS ? '✓ 是 iOS' : '✗ 非 iOS';
iosEl.className = 'val ' + (isIOS ? 'warn' : 'ok');

const isSecure = location.protocol === 'https:' || location.hostname === 'localhost';
const httpsEl = document.getElementById('is-https');
httpsEl.textContent = isSecure ? '✓ 安全連線' : '✗ 非 HTTPS（相機功能將被封鎖）';
httpsEl.className = 'val ' + (isSecure ? 'ok' : 'no');

const bdEl = document.getElementById('barcode-detector');
if ('BarcodeDetector' in window) {
  bdEl.textContent = '✓ 支援'; bdEl.className = 'val ok';
  BarcodeDetector.getSupportedFormats().then(f => {
    bdEl.textContent = '✓ 支援（' + f.join(', ') + '）';
  });
} else {
  bdEl.textContent = '✗ 不支援'; bdEl.className = 'val no';
}

const gmEl = document.getElementById('getusermedia');
if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
  gmEl.textContent = '✓ 支援'; gmEl.className = 'val ok';
} else {
  gmEl.textContent = '✗ 不支援'; gmEl.className = 'val no';
}

// 測試相機
document.getElementById('test-camera').addEventListener('click', () => {
  addLog('▶ 嘗試開啟相機...', 'info');
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    addLog('✗ getUserMedia 不支援', 'err'); return;
  }
  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
    .then(stream => {
      addLog('✓ 相機開啟成功！', 'ok');
      addLog('  軌道數量：' + stream.getTracks().length, 'ok');
      stream.getTracks().forEach(t => {
        addLog('  軌道：' + t.kind + ' / ' + t.label, 'ok');
        t.stop();
      });
    })
    .catch(err => {
      addLog('✗ 相機開啟失敗：' + err.name + ' - ' + err.message, 'err');
    });
});

// 測試拍照
document.getElementById('test-photo').addEventListener('click', () => {
  document.getElementById('photo-input').click();
});

document.getElementById('photo-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  addLog('▶ 已拍照，檔案大小：' + (file.size / 1024).toFixed(1) + ' KB', 'info');
  addLog('  檔案類型：' + file.type, 'info');
  const url = URL.createObjectURL(file);
  const preview = document.getElementById('preview');
  preview.src = url;
  preview.style.display = 'block';
  const img = new Image();
  img.onload = () => {
    addLog('  圖片尺寸：' + img.width + ' x ' + img.height, 'info');
    if ('BarcodeDetector' in window) {
      addLog('▶ 用 BarcodeDetector 解析...', 'info');
      new BarcodeDetector({ formats: ['code_128','ean_13','ean_8','code_39','upc_a','qr_code'] })
        .detect(img)
        .then(results => {
          if (results.length > 0) {
            addLog('✓ 掃描成功！條碼：' + results[0].rawValue + ' (' + results[0].format + ')', 'ok');
          } else {
            addLog('✗ BarcodeDetector 未偵測到條碼', 'err');
            if (typeof ZXing !== 'undefined') tryZXingOnImage(img);
          }
        }).catch(err => addLog('✗ BarcodeDetector 錯誤：' + err.message, 'err'));
    } else if (typeof ZXing !== 'undefined') {
      tryZXingOnImage(img);
    } else {
      addLog('⚠ 尚未載入 ZXing，請先點「測試載入 ZXing」', 'info');
    }
  };
  img.src = url;
  e.target.value = '';
});

function tryZXingOnImage(img) {
  addLog('▶ 用 ZXing 解析圖片...', 'info');
  try {
    const canvas = document.createElement('canvas');
    canvas.width = img.width; canvas.height = img.height;
    canvas.getContext('2d').drawImage(img, 0, 0);
    const hints = new Map();
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
      ZXing.BarcodeFormat.CODE_128, ZXing.BarcodeFormat.EAN_13,
      ZXing.BarcodeFormat.EAN_8, ZXing.BarcodeFormat.CODE_39, ZXing.BarcodeFormat.QR_CODE,
    ]);
    hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
    const reader = new ZXing.BrowserMultiFormatReader(hints);
    const luminance = new ZXing.HTMLCanvasElementLuminanceSource(canvas);
    const bitmap = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(luminance));
    const result = reader.decode(bitmap);
    addLog('✓ ZXing 掃描成功！條碼：' + result.getText(), 'ok');
  } catch(e) {
    addLog('✗ ZXing 未偵測到條碼：' + e.message, 'err');
    addLog('  → 請確認條碼清晰、光線充足、整條碼都在畫面內', 'info');
  }
}

// 測試 ZXing 載入
document.getElementById('test-zxing').addEventListener('click', () => {
  if (typeof ZXing !== 'undefined') { addLog('✓ ZXing 已載入', 'ok'); return; }
  addLog('▶ 嘗試載入 ZXing...', 'info');
  const s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js';
  s.onload = () => addLog('✓ ZXing 載入成功！版本：' + (ZXing.version || '未知'), 'ok');
  s.onerror = () => {
    addLog('✗ CDN 1 失敗，嘗試備用...', 'err');
    const s2 = document.createElement('script');
    s2.src = 'https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js';
    s2.onload = () => addLog('✓ ZXing 備用 CDN 載入成功！', 'ok');
    s2.onerror = () => addLog('✗ 所有 CDN 都失敗，請檢查網路連線', 'err');
    document.head.appendChild(s2);
  };
  document.head.appendChild(s);
});
</script>
</body>
</html>
