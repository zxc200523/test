<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>退貨掃碼系統</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #ffffff;
  --bg-secondary: #f5f5f4;
  --bg-tertiary: #eeede8;
  --text-primary: #1a1a19;
  --text-secondary: #6b6b68;
  --border-light: rgba(0,0,0,0.12);
  --border-mid: rgba(0,0,0,0.22);
  --purple-bg: #EEEDFE;
  --purple-text: #3C3489;
  --purple-btn: #534AB7;
  --purple-btn-hover: #3C3489;
  --teal-bg: #E1F5EE;
  --teal-text: #085041;
  --amber-bg: #FAEEDA;
  --amber-text: #633806;
  --red-bg: #FCEBEB;
  --red-text: #791F1F;
  --radius-md: 8px;
  --radius-lg: 12px;
  --shadow: 0 1px 4px rgba(0,0,0,0.07);
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg-primary: #1e1e1c;
    --bg-secondary: #282826;
    --bg-tertiary: #323230;
    --text-primary: #f0efea;
    --text-secondary: #9e9e98;
    --border-light: rgba(255,255,255,0.1);
    --border-mid: rgba(255,255,255,0.2);
    --purple-bg: #26215C;
    --purple-text: #CECBF6;
    --purple-btn: #7F77DD;
    --purple-btn-hover: #AFA9EC;
    --teal-bg: #04342C;
    --teal-text: #9FE1CB;
    --amber-bg: #412402;
    --amber-text: #FAC775;
    --red-bg: #501313;
    --red-text: #F7C1C1;
  }
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
  background: var(--bg-tertiary);
  color: var(--text-primary);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.5;
}

.app {
  max-width: 680px;
  margin: 0 auto;
  padding: 1rem;
  min-height: 100vh;
}

/* Header */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px;
  background: var(--bg-primary);
  border: 0.5px solid var(--border-light);
  border-radius: var(--radius-lg);
  margin-bottom: 1rem;
  box-shadow: var(--shadow);
}
.header-left { display: flex; align-items: center; gap: 10px; }
.header-title { font-size: 16px; font-weight: 500; }
.user-badge { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-secondary); }
.avatar {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--purple-bg); color: var(--purple-text);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 500; flex-shrink: 0;
}
.role-tag {
  font-size: 11px; padding: 2px 7px;
  border-radius: var(--radius-md);
  background: var(--purple-bg); color: var(--purple-text);
}

/* Login screen */
#login-screen {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; padding: 1rem;
}
.login-card {
  background: var(--bg-primary);
  border: 0.5px solid var(--border-light);
  border-radius: var(--radius-lg);
  padding: 2rem;
  width: 100%; max-width: 380px;
  box-shadow: var(--shadow);
}
.login-logo {
  text-align: center; margin-bottom: 1.5rem;
}
.login-logo i { font-size: 40px; color: var(--purple-btn); }
.login-logo h1 { font-size: 18px; font-weight: 500; margin-top: 8px; }
.login-logo p { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
.login-field { margin-bottom: 12px; }
.login-field label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 4px; }
.login-field input { width: 100%; }
.login-btn {
  width: 100%; padding: 10px;
  background: var(--purple-btn); color: #fff;
  border: none; border-radius: var(--radius-md);
  font-size: 15px; font-weight: 500; cursor: pointer;
  margin-top: 8px;
}
.login-btn:hover { background: var(--purple-btn-hover); }
.login-error {
  font-size: 12px; color: var(--red-text);
  background: var(--red-bg);
  padding: 6px 10px; border-radius: var(--radius-md);
  margin-top: 8px; display: none;
}

/* Tabs */
.tabs {
  display: flex; gap: 8px; margin-bottom: 1rem;
  overflow-x: auto; padding-bottom: 2px;
}
.tab {
  flex: 1; min-width: 80px; padding: 8px 4px;
  border: 0.5px solid var(--border-light);
  background: var(--bg-secondary);
  border-radius: var(--radius-md);
  font-size: 13px; color: var(--text-secondary);
  cursor: pointer; text-align: center; white-space: nowrap;
}
.tab.active {
  background: var(--bg-primary);
  color: var(--text-primary);
  border-color: var(--border-mid);
  font-weight: 500;
}
.tab:hover:not(.active) { background: var(--bg-primary); }

/* Pages */
.page { display: none; }
.page.active { display: block; }

/* Cards */
.card {
  background: var(--bg-primary);
  border: 0.5px solid var(--border-light);
  border-radius: var(--radius-lg);
  padding: 1rem 1.25rem;
  margin-bottom: 12px;
  box-shadow: var(--shadow);
}
.card-title {
  font-size: 13px; font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 6px;
}

/* Form elements */
input[type="text"], input[type="password"] {
  width: 100%; padding: 8px 10px;
  border: 0.5px solid var(--border-mid);
  border-radius: var(--radius-md);
  font-size: 14px; background: var(--bg-primary);
  color: var(--text-primary); outline: none;
}
input[type="text"]:focus, input[type="password"]:focus {
  border-color: var(--purple-btn);
  box-shadow: 0 0 0 2px rgba(83,74,183,0.15);
}
button {
  padding: 8px 14px;
  border: 0.5px solid var(--border-mid);
  border-radius: var(--radius-md);
  background: var(--bg-primary);
  color: var(--text-primary);
  font-size: 14px; cursor: pointer;
}
button:hover { background: var(--bg-secondary); }

/* Customer */
.input-row { display: flex; gap: 8px; align-items: center; }
.input-row input { flex: 1; }
.customer-result {
  margin-top: 8px; padding: 8px 10px;
  background: var(--bg-secondary);
  border-radius: var(--radius-md);
  font-size: 13px;
  display: none; align-items: center; justify-content: space-between;
}
.customer-result.show { display: flex; }
.tag-teal { font-size: 11px; padding: 2px 8px; border-radius: var(--radius-md); background: var(--teal-bg); color: var(--teal-text); }
.tag-amber { font-size: 11px; padding: 2px 8px; border-radius: var(--radius-md); background: var(--amber-bg); color: var(--amber-text); }
.manual-hint { font-size: 12px; color: var(--text-secondary); margin-top: 6px; display: none; }
.manual-hint a { color: var(--purple-btn); cursor: pointer; }

/* Scan area */
.scan-area {
  border: 1.5px dashed var(--border-mid);
  border-radius: var(--radius-lg);
  padding: 1.5rem; text-align: center;
  margin-bottom: 12px; cursor: pointer;
}
.scan-area:hover { background: var(--bg-secondary); }
.scan-icon { font-size: 36px; color: var(--text-secondary); margin-bottom: 6px; }
.scan-hint { font-size: 13px; color: var(--text-secondary); }
.barcode-input-row { display: flex; gap: 8px; }
.barcode-input-row input { flex: 1; font-family: monospace; }

/* Camera scanner */
.scan-mode-btns { display: flex; gap: 8px; margin-bottom: 12px; }
.scan-mode-btn {
  flex: 1; padding: 10px 8px;
  border: 0.5px solid var(--border-mid);
  border-radius: var(--radius-md);
  background: var(--bg-secondary);
  color: var(--text-secondary);
  font-size: 13px; cursor: pointer; text-align: center;
}
.scan-mode-btn.active {
  background: var(--purple-bg); color: var(--purple-text);
  border-color: var(--purple-btn); font-weight: 500;
}
#camera-container {
  position: relative; width: 100%; border-radius: var(--radius-lg);
  overflow: hidden; background: #000; margin-bottom: 12px;
  display: none;
}
#camera-container video { width: 100%; display: block; max-height: 260px; object-fit: cover; }
#camera-container canvas { display: none; }
.scan-overlay {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  width: 200px; height: 120px; border: 2px solid rgba(255,255,255,0.8);
  border-radius: 8px; pointer-events: none;
}
.scan-overlay::before, .scan-overlay::after {
  content: ''; position: absolute; width: 20px; height: 20px;
  border-color: #fff; border-style: solid;
}
.scan-overlay::before { top: -2px; left: -2px; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
.scan-overlay::after { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }
.scan-line {
  position: absolute; left: 10%; width: 80%; height: 2px;
  background: rgba(83,74,183,0.8);
  animation: scanline 1.8s ease-in-out infinite;
}
@keyframes scanline { 0%,100% { top: 20%; } 50% { top: 75%; } }
.camera-result-banner {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(15,110,86,0.92); color: #fff;
  padding: 8px 12px; font-size: 13px; text-align: center;
  display: none;
}
.ios-capture-btn {
  display: none;
  width: 100%; padding: 14px;
  background: var(--purple-btn); color: #fff;
  border: none; border-radius: var(--radius-lg);
  font-size: 16px; font-weight: 500; cursor: pointer;
  margin-bottom: 12px; text-align: center;
}
.ios-capture-btn:active { background: var(--purple-btn-hover); }
#ios-file-input { display: none; }
.ios-preview {
  width: 100%; border-radius: var(--radius-lg);
  margin-bottom: 8px; display: none; max-height: 200px;
  object-fit: contain; background: var(--bg-secondary);
}
.ios-status {
  text-align: center; padding: 10px;
  font-size: 13px; color: var(--text-secondary);
  display: none;
}

/* Product list */
.product-list { display: flex; flex-direction: column; gap: 8px; }
.product-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  background: var(--bg-secondary);
  border-radius: var(--radius-md);
  font-size: 14px;
}
.product-info { flex: 1; min-width: 0; }
.product-name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.product-code { font-family: monospace; font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
.qty-control { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.qty-btn {
  width: 28px; height: 28px; border-radius: 50%;
  border: 0.5px solid var(--border-mid);
  background: var(--bg-primary);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px; padding: 0;
}
.qty-btn:hover { background: var(--bg-secondary); }
.qty-num { font-weight: 500; min-width: 28px; text-align: center; }
.del-btn { color: var(--text-secondary); cursor: pointer; padding: 4px; border: none; background: none; font-size: 16px; border-radius: var(--radius-md); }
.del-btn:hover { color: #E24B4A; background: var(--red-bg); }
.empty-list { text-align: center; padding: 2rem 1rem; color: var(--text-secondary); font-size: 13px; }

/* Banners */
.banner {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; border-radius: var(--radius-md);
  font-size: 13px; margin-bottom: 12px;
}
.banner-offline { background: var(--red-bg); color: var(--red-text); display: none; }
.banner-saved { background: var(--teal-bg); color: var(--teal-text); display: none; }

/* Action buttons */
.action-row { display: flex; gap: 8px; margin-top: 4px; }
.btn-save {
  flex: 1; padding: 11px;
  background: var(--bg-secondary);
  border: 0.5px solid var(--border-mid);
  border-radius: var(--radius-md);
  font-size: 14px; cursor: pointer; color: var(--text-primary);
}
.btn-save:hover { background: var(--bg-tertiary); }
.btn-submit {
  flex: 2; padding: 11px;
  background: var(--purple-btn); color: #fff;
  border: none; border-radius: var(--radius-md);
  font-size: 14px; font-weight: 500; cursor: pointer;
}
.btn-submit:disabled { background: var(--bg-secondary); color: var(--text-secondary); cursor: not-allowed; }
.btn-submit:not(:disabled):hover { background: var(--purple-btn-hover); }

/* Status badges */
.status-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; padding: 3px 8px; border-radius: var(--radius-md);
  white-space: nowrap;
}
.s-draft { background: var(--amber-bg); color: var(--amber-text); }
.s-sent { background: var(--teal-bg); color: var(--teal-text); }
.s-pending { background: var(--purple-bg); color: var(--purple-text); }

/* History items */
.history-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 12px;
  background: var(--bg-secondary);
  border-radius: var(--radius-md);
  margin-bottom: 8px; font-size: 13px; gap: 8px;
}
.history-meta { color: var(--text-secondary); font-size: 12px; margin-top: 2px; }

/* Metrics */
.summary-row { display: flex; gap: 8px; margin-bottom: 12px; }
.metric {
  flex: 1; padding: 12px;
  background: var(--bg-secondary);
  border-radius: var(--radius-md);
  text-align: center;
}
.metric-val { font-size: 22px; font-weight: 500; }
.metric-lbl { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

/* Draft badge */
.draft-badge {
  background: var(--amber-bg); color: var(--amber-text);
  border-radius: 4px; padding: 0 5px; font-size: 11px;
}

/* Responsive */
@media (max-width: 480px) {
  .app { padding: 0.75rem; }
  .header-title { font-size: 14px; }
  .summary-row { flex-wrap: wrap; }
  .metric { min-width: calc(33% - 6px); }
}
</style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <i class="ti ti-arrow-back-up"></i>
      <h1>退貨掃碼系統</h1>
      <p>請登入以繼續</p>
    </div>
    <div class="login-field">
      <label>帳號</label>
      <input type="text" id="login-user" placeholder="輸入帳號" />
    </div>
    <div class="login-field">
      <label>密碼</label>
      <input type="password" id="login-pass" placeholder="輸入密碼" />
    </div>
    <button class="login-btn" id="login-btn">登入</button>
    <div id="login-error" class="login-error">帳號或密碼錯誤，請重新輸入</div>

  </div>
</div>

<!-- Main App -->
<div id="main-app" style="display:none;">
  <div class="app">
    <div class="header">
      <div class="header-left">
        <i class="ti ti-arrow-back-up" style="font-size:20px; color:var(--text-secondary)" aria-hidden="true"></i>
        <span class="header-title">退貨掃碼系統</span>
      </div>
      <div class="user-badge">
        <div class="avatar" id="user-avatar">倉</div>
        <span id="user-name">使用者</span>
        <span class="role-tag" id="user-role">倉管</span>
        <button id="logout-btn" style="padding:4px 8px; font-size:12px; margin-left:4px;">
          <i class="ti ti-logout" aria-hidden="true"></i>
        </button>
      </div>
    </div>

    <div class="tabs" id="main-tabs">
      <div class="tab active" id="tab-scan"><i class="ti ti-barcode" aria-hidden="true"></i> 建立退貨單</div>
      <div class="tab" id="tab-history"><i class="ti ti-history" aria-hidden="true"></i> 退貨紀錄</div>
      <div class="tab" id="tab-drafts">
        <i class="ti ti-file" aria-hidden="true"></i> 草稿
        <span class="draft-badge" id="draft-count">1</span>
      </div>
      <div class="tab" id="admin-tab" style="display:none;">
        <i class="ti ti-settings" aria-hidden="true"></i> 管理
      </div>
    </div>

    <!-- 建立退貨單 -->
    <div id="page-scan" class="page active">
      <div class="banner banner-offline" id="offline-banner">
        <i class="ti ti-wifi-off" aria-hidden="true"></i>
        目前離線 — 資料已暫存裝置，網路恢復後可送出
      </div>
      <div class="banner banner-saved" id="saved-banner">
        <i class="ti ti-check" aria-hidden="true"></i>
        草稿已暫存
      </div>

      <div class="card">
        <div class="card-title"><i class="ti ti-user" aria-hidden="true"></i> 客戶</div>
        <div class="input-row">
          <input type="text" id="customer-input" placeholder="輸入客戶名稱或代號搜尋..." />
          <button id="customer-search-btn">
            <i class="ti ti-search" aria-hidden="true"></i>
          </button>
        </div>
        <div id="customer-result" class="customer-result">
          <span id="customer-name-display"></span>
          <span class="tag-teal">已選取</span>
        </div>
        <div class="manual-hint" id="manual-hint">
          找不到客戶？<a id="manual-link">切換手動輸入</a>
        </div>
      </div>

      <div class="card">
        <div class="card-title"><i class="ti ti-barcode" aria-hidden="true"></i> 掃描商品</div>
        <div class="scan-mode-btns">
          <button class="scan-mode-btn active" id="btn-mode-camera">
            <i class="ti ti-camera" aria-hidden="true"></i> 鏡頭掃碼
          </button>
          <button class="scan-mode-btn" id="btn-mode-gun">
            <i class="ti ti-scan" aria-hidden="true"></i> 掃碼槍／手動輸入
          </button>
        </div>

        <div id="camera-container">
          <video id="camera-video" playsinline autoplay muted></video>
          <canvas id="camera-canvas"></canvas>
          <div class="scan-overlay"><div class="scan-line"></div></div>
          <div class="camera-result-banner" id="camera-result-banner"></div>
        </div>
        <!-- iOS 拍照模式 -->
        <input type="file" id="ios-file-input" accept="image/*" capture="environment" />
        <button class="ios-capture-btn" id="ios-capture-btn">
          <i class="ti ti-camera" aria-hidden="true"></i>　拍照掃描條碼
        </button>
        <img id="ios-preview" class="ios-preview" alt="拍攝預覽" />
        <div class="ios-status" id="ios-status"></div>
        <button class="stop-camera-btn" id="stop-camera-btn">
          <i class="ti ti-camera-off" aria-hidden="true"></i> 關閉鏡頭
        </button>

        <div id="gun-input-area" style="display:none;">
          <div class="scan-area" id="scan-area-focus">
            <div class="scan-icon"><i class="ti ti-scan" aria-hidden="true"></i></div>
            <div class="scan-hint">點此聚焦，再用掃碼槍掃描</div>
          </div>
        </div>
        <div class="barcode-input-row">
          <input type="text" id="barcode-field" placeholder="條碼（輸入後按 Enter）" autocomplete="off" />
          <button id="add-product-btn"><i class="ti ti-plus" aria-hidden="true"></i> 加入</button>
        </div>

      </div>

      <div class="card">
        <div class="card-title"><i class="ti ti-package" aria-hidden="true"></i> 退貨清單</div>
        <div id="product-list" class="product-list">
          <div class="empty-list">
            <i class="ti ti-inbox" style="font-size:32px; display:block; margin-bottom:8px;" aria-hidden="true"></i>
            尚未掃描任何商品
          </div>
        </div>
      </div>

      <div class="action-row">
        <button class="btn-save" id="save-draft-btn">
          <i class="ti ti-device-floppy" aria-hidden="true"></i> 暫存草稿
        </button>
        <button class="btn-submit" id="submit-btn" disabled>
          <i class="ti ti-send" aria-hidden="true"></i> 確認送出 ERP
        </button>
      </div>
    </div>

    <!-- 退貨紀錄 -->
    <div id="page-history" class="page">
      <div class="summary-row">
        <div class="metric"><div class="metric-val" id="stat-today">0</div><div class="metric-lbl">今日退貨單</div></div>
        <div class="metric"><div class="metric-val" id="stat-pending">0</div><div class="metric-lbl">處理中</div></div>
        <div class="metric"><div class="metric-val" id="stat-done">0</div><div class="metric-lbl">已完成</div></div>
      </div>
      <div class="card">
        <div class="card-title"><i class="ti ti-history" aria-hidden="true"></i> 退貨單紀錄</div>
        <div id="history-list"></div>
      </div>
    </div>

    <!-- 草稿 -->
    <div id="page-drafts" class="page">
      <div class="card">
        <div class="card-title"><i class="ti ti-file" aria-hidden="true"></i> 暫存草稿</div>
        <div id="drafts-list"></div>
      </div>
    </div>

    <!-- 管理（僅管理員可見） -->
    <div id="page-admin" class="page">
      <div class="card">
        <div class="card-title"><i class="ti ti-users" aria-hidden="true"></i> 帳號管理</div>
        <div style="display:flex; flex-direction:column; gap:8px;" id="user-list"></div>
        <div style="margin-top:12px; padding-top:12px; border-top:0.5px solid var(--border-light);">
          <div class="card-title">新增帳號</div>
          <div style="display:flex; gap:8px; flex-wrap:wrap;">
            <input type="text" id="new-username" placeholder="帳號" style="flex:1; min-width:100px;" />
            <input type="password" id="new-password" placeholder="密碼" style="flex:1; min-width:100px;" />
            <select id="new-role" style="padding:8px; border:0.5px solid var(--border-mid); border-radius:var(--radius-md); background:var(--bg-primary); color:var(--text-primary); font-size:14px;">
              <option value="倉管">倉管</option>
              <option value="管理員">管理員</option>
            </select>
            <button id="add-user-btn" style="background:var(--purple-btn); color:#fff; border:none;">
              <i class="ti ti-plus" aria-hidden="true"></i> 新增
            </button>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title"><i class="ti ti-chart-bar" aria-hidden="true"></i> 系統統計</div>
        <div class="summary-row">
          <div class="metric"><div class="metric-val" id="stat-week">0</div><div class="metric-lbl">本週退貨單</div></div>
          <div class="metric"><div class="metric-val" id="stat-users">0</div><div class="metric-lbl">使用人數</div></div>
          <div class="metric"><div class="metric-val" id="stat-drafts">0</div><div class="metric-lbl">草稿未送</div></div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
// ── 資料（未來串接 API 替換此處）──
const mockCustomers = [];   // 待串接 NEWPOWER 客戶 API
const mockProducts = {};    // 待串接 NEWPOWER 產品 API

let users = [
  { username: 'admin', password: 'admin', name: '系統管理員', role: '管理員' },
];

let currentUser = null;
let products = [];
let selectedCustomer = '';
let drafts = [];
let history = [];

function doLogin() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value;
  const user = users.find(x => x.username === u && x.password === p);
  if (!user) {
    document.getElementById('login-error').style.display = 'block';
    return;
  }
  currentUser = user;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-app').style.display = 'block';
  document.getElementById('user-avatar').textContent = user.name.charAt(0);
  document.getElementById('user-name').textContent = user.name;
  document.getElementById('user-role').textContent = user.role;
  if (user.role === '管理員') {
    document.getElementById('admin-tab').style.display = '';
  }
  renderHistory();
  renderDrafts();
  renderUserList();
}

function doLogout() {
  currentUser = null;
  products = []; selectedCustomer = '';
  document.getElementById('main-app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-error').style.display = 'none';
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
  document.getElementById('admin-tab').style.display = 'none';
  switchTab('scan');
  resetScanForm();
}

function switchTab(tab) {
  const tabs = ['scan','history','drafts','admin'];
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const idx = tabs.indexOf(tab);
  const visibleTabs = document.querySelectorAll('.tab');
  const adminShown = document.getElementById('admin-tab').style.display !== 'none';
  const tabMap = adminShown ? ['scan','history','drafts','admin'] : ['scan','history','drafts'];
  const vi = tabMap.indexOf(tab);
  if (vi >= 0 && visibleTabs[vi]) visibleTabs[vi].classList.add('active');
  const pg = document.getElementById('page-' + tab);
  if (pg) pg.classList.add('active');
}

function searchCustomer(val) {
  const result = document.getElementById('customer-result');
  const nameEl = document.getElementById('customer-name-display');
  const hint = document.getElementById('manual-hint');
  if (!val || val.length < 1) {
    result.classList.remove('show'); hint.style.display = 'none';
    selectedCustomer = ''; checkReady(); return;
  }
  const found = mockCustomers.find(c => c.includes(val));
  if (found) {
    nameEl.textContent = found;
    result.classList.add('show');
    selectedCustomer = found;
    hint.style.display = 'none';
  } else {
    result.classList.remove('show');
    hint.style.display = 'block';
    selectedCustomer = '';
  }
  checkReady();
}

function enableManual() {
  const val = document.getElementById('customer-input').value.trim();
  if (!val) return;
  selectedCustomer = val;
  document.getElementById('customer-name-display').textContent = val + '（手動輸入）';
  const result = document.getElementById('customer-result');
  result.innerHTML = '<span>' + val + ' <span class="tag-amber">手動</span></span>';
  result.classList.add('show');
  document.getElementById('manual-hint').style.display = 'none';
  checkReady();
}

function addProduct() {
  const field = document.getElementById('barcode-field');
  const barcode = field.value.trim();
  if (!barcode) return;
  const product = mockProducts[barcode];
  if (!product) {
    field.style.borderColor = '#E24B4A';
    field.value = ''; field.placeholder = '⚠ 條碼不存在，請確認';
    setTimeout(() => { field.style.borderColor = ''; field.placeholder = '條碼（輸入後按 Enter）'; }, 2000);
    return;
  }
  const existing = products.find(p => p.code === product.code);
  if (existing) { existing.qty++; }
  else { products.push({ ...product, qty: 1 }); }
  field.value = '';
  renderProducts();
  checkReady();
}

function renderProducts() {
  const list = document.getElementById('product-list');
  if (products.length === 0) {
    list.innerHTML = '<div class="empty-list"><i class="ti ti-inbox" style="font-size:32px;display:block;margin-bottom:8px;" aria-hidden="true"></i>尚未掃描任何商品</div>';
    return;
  }
  list.innerHTML = products.map((p, i) => `
    <div class="product-item">
      <div class="product-info">
        <div class="product-name">${p.name}</div>
        <div class="product-code">${p.code}</div>
      </div>
      <div class="qty-control">
        <button class="qty-btn" data-action="qty-minus" data-idx="${i}">−</button>
        <div class="qty-num">${p.qty}</div>
        <button class="qty-btn" data-action="qty-plus" data-idx="${i}">+</button>
      </div>
      <button class="del-btn" data-action="remove-product" data-idx="${i}" aria-label="移除商品">
        <i class="ti ti-trash" aria-hidden="true"></i>
      </button>
    </div>
  `).join('');
}

function changeQty(i, delta) {
  products[i].qty = Math.max(1, products[i].qty + delta);
  renderProducts();
}

function removeProduct(i) {
  products.splice(i, 1);
  renderProducts();
  checkReady();
}

function checkReady() {
  document.getElementById('submit-btn').disabled = !(selectedCustomer && products.length > 0);
}

function saveDraft() {
  if (products.length === 0 && !selectedCustomer) return;
  const draft = {
    id: Date.now(),
    customer: selectedCustomer || '（未填客戶）',
    items: JSON.parse(JSON.stringify(products)),
    savedAt: new Date().toLocaleString('zh-TW'),
    savedBy: currentUser ? currentUser.name : ''
  };
  drafts.unshift(draft);
  document.getElementById('draft-count').textContent = drafts.length;
  renderDrafts();
  showBanner('saved-banner');
}

function showBanner(id) {
  const b = document.getElementById(id);
  b.style.display = 'flex';
  setTimeout(() => { b.style.display = 'none'; }, 2200);
}

function loadDraft(idx) {
  const draft = drafts[idx];
  products = JSON.parse(JSON.stringify(draft.items));
  selectedCustomer = draft.customer;
  document.getElementById('customer-input').value = draft.customer.replace('（手動輸入）','');
  document.getElementById('customer-name-display').textContent = draft.customer;
  document.getElementById('customer-result').classList.add('show');
  renderProducts();
  checkReady();
  switchTab('scan');
}

function deleteDraft(idx) {
  drafts.splice(idx, 1);
  document.getElementById('draft-count').textContent = drafts.length;
  renderDrafts();
}

function renderDrafts() {
  const list = document.getElementById('drafts-list');
  if (drafts.length === 0) {
    list.innerHTML = '<div class="empty-list"><i class="ti ti-file-off" style="font-size:28px;display:block;margin-bottom:8px;"></i>沒有草稿</div>';
    return;
  }
  list.innerHTML = drafts.map((d, i) => `
    <div class="history-item">
      <div style="flex:1;">
        <div style="font-weight:500;">${d.customer}</div>
        <div class="history-meta">${d.items.length} 項商品・${d.savedBy}</div>
        <div class="history-meta">${d.savedAt}</div>
      </div>
      <div style="display:flex; gap:6px; align-items:center; flex-shrink:0;">
        <button data-action="load-draft" data-idx="${i}" style="padding:5px 10px; font-size:12px;">
          <i class="ti ti-edit" aria-hidden="true"></i> 繼續
        </button>
        <button data-action="delete-draft" data-idx="${i}" style="padding:5px 8px; font-size:12px; color:var(--red-text); border-color:transparent;">
          <i class="ti ti-trash" aria-hidden="true"></i>
        </button>
      </div>
    </div>
  `).join('');
}

function submitOrder() {
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader-2" aria-hidden="true"></i> 送出中...';
  setTimeout(() => {
    const newEntry = {
      id: 'RET-' + new Date().toISOString().slice(0,10).replace(/-/g,'') + '-0' + (history.length + 1),
      customer: selectedCustomer,
      items: products.reduce((s, p) => s + p.qty, 0),
      status: 'sent',
      time: new Date().toLocaleString('zh-TW'),
      user: currentUser ? currentUser.name : ''
    };
    history.unshift(newEntry);
    renderHistory();
    products = []; selectedCustomer = '';
    resetScanForm();
    btn.innerHTML = '<i class="ti ti-check" aria-hidden="true"></i> 已送出 ERP';
    btn.style.background = '#0F6E56';
    setTimeout(() => {
      btn.innerHTML = '<i class="ti ti-send" aria-hidden="true"></i> 確認送出 ERP';
      btn.style.background = '';
      btn.disabled = true;
    }, 2000);
  }, 1200);
}

function resetScanForm() {
  document.getElementById('customer-input').value = '';
  document.getElementById('customer-result').classList.remove('show');
  document.getElementById('customer-result').innerHTML = '<span id="customer-name-display"></span><span class="tag-teal">已選取</span>';
  document.getElementById('manual-hint').style.display = 'none';
  renderProducts();
}

const statusLabel = { sent: '已送ERP', pending: '待送出', draft: '草稿' };
const statusClass = { sent: 's-sent', pending: 's-pending', draft: 's-draft' };
const statusIcon = { sent: 'ti-check', pending: 'ti-clock', draft: 'ti-file' };

function renderHistory() {
  const list = document.getElementById('history-list');
  const show = (currentUser && currentUser.role === '管理員') ? history : history.filter(h => h.user === (currentUser ? currentUser.name : ''));

  // 更新統計
  const today = new Date().toLocaleDateString('zh-TW');
  const todayList = show.filter(h => h.time.startsWith(today.replace(/\//g, '/')));
  const el = id => document.getElementById(id);
  if (el('stat-today')) el('stat-today').textContent = todayList.length;
  if (el('stat-pending')) el('stat-pending').textContent = show.filter(h => h.status === 'pending').length;
  if (el('stat-done')) el('stat-done').textContent = show.filter(h => h.status === 'sent').length;
  if (el('stat-week')) el('stat-week').textContent = history.length;
  if (el('stat-users')) el('stat-users').textContent = users.length;
  if (el('stat-drafts')) el('stat-drafts').textContent = drafts.length;

  if (show.length === 0) {
    list.innerHTML = '<div class="empty-list">尚無退貨紀錄</div>'; return;
  }
  list.innerHTML = show.map(h => `
    <div class="history-item">
      <div style="flex:1; min-width:0;">
        <div style="font-weight:500;">${h.id}</div>
        <div class="history-meta">客戶：${h.customer} ・ ${h.items} 項商品・${h.user}</div>
        <div class="history-meta">${h.time}</div>
      </div>
      <span class="status-badge ${statusClass[h.status]}">
        <i class="ti ${statusIcon[h.status]}" aria-hidden="true"></i> ${statusLabel[h.status]}
      </span>
    </div>
  `).join('');
}

function renderUserList() {
  const list = document.getElementById('user-list');
  if (!list) return;
  list.innerHTML = users.map((u, i) => `
    <div class="history-item">
      <div style="display:flex; align-items:center; gap:10px; flex:1;">
        <div class="avatar">${u.name.charAt(0)}</div>
        <div>
          <div style="font-weight:500;">${u.name}</div>
          <div class="history-meta">帳號：${u.username} ・ 角色：${u.role}</div>
        </div>
      </div>
      ${i > 0 ? `<button data-action="remove-user" data-idx="${i}" style="padding:5px 8px; font-size:12px; color:var(--red-text); border-color:transparent;"><i class="ti ti-trash" aria-hidden="true"></i></button>` : ''}
    </div>
  `).join('');
}

function addUser() {
  const uname = document.getElementById('new-username').value.trim();
  const pass = document.getElementById('new-password').value.trim();
  const role = document.getElementById('new-role').value;
  if (!uname || !pass) return;
  if (users.find(u => u.username === uname)) { alert('帳號已存在'); return; }
  users.push({ username: uname, password: pass, name: uname, role });
  document.getElementById('new-username').value = '';
  document.getElementById('new-password').value = '';
  renderUserList();
}

function removeUser(i) {
  users.splice(i, 1);
  renderUserList();
}

window.addEventListener('online', () => { document.getElementById('offline-banner').style.display = 'none'; });
window.addEventListener('offline', () => { document.getElementById('offline-banner').style.display = 'flex'; });

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('login-btn').addEventListener('click', doLogin);
  document.getElementById('login-user').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  document.getElementById('login-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  document.getElementById('logout-btn').addEventListener('click', doLogout);

  document.getElementById('tab-scan').addEventListener('click', () => switchTab('scan'));
  document.getElementById('tab-history').addEventListener('click', () => switchTab('history'));
  document.getElementById('tab-drafts').addEventListener('click', () => switchTab('drafts'));
  document.getElementById('admin-tab').addEventListener('click', () => switchTab('admin'));

  document.getElementById('customer-input').addEventListener('input', e => searchCustomer(e.target.value));
  document.getElementById('customer-search-btn').addEventListener('click', () => searchCustomer(document.getElementById('customer-input').value));
  document.getElementById('manual-link').addEventListener('click', enableManual);

  document.getElementById('btn-mode-camera').addEventListener('click', () => setScanMode('camera'));
  document.getElementById('btn-mode-gun').addEventListener('click', () => setScanMode('gun'));
  document.getElementById('stop-camera-btn').addEventListener('click', stopCamera);
  document.getElementById('ios-capture-btn').addEventListener('click', () => {
    document.getElementById('ios-file-input').click();
  });
  document.getElementById('ios-file-input').addEventListener('change', handleIOSCapture);
  document.getElementById('scan-area-focus').addEventListener('click', () => document.getElementById('barcode-field').focus());

  document.getElementById('barcode-field').addEventListener('keydown', e => { if (e.key === 'Enter') addProduct(); });
  document.getElementById('add-product-btn').addEventListener('click', addProduct);

  document.getElementById('save-draft-btn').addEventListener('click', saveDraft);
  document.getElementById('submit-btn').addEventListener('click', submitOrder);
  document.getElementById('add-user-btn').addEventListener('click', addUser);

  document.getElementById('main-app').addEventListener('click', e => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const action = btn.dataset.action;
    const idx = parseInt(btn.dataset.idx);
    if (action === 'qty-minus') changeQty(idx, -1);
    else if (action === 'qty-plus') changeQty(idx, 1);
    else if (action === 'remove-product') removeProduct(idx);
    else if (action === 'load-draft') loadDraft(idx);
    else if (action === 'delete-draft') deleteDraft(idx);
    else if (action === 'remove-user') removeUser(idx);
  });

  // ② 登入後預設掃碼槍模式，不自動開相機
  setScanMode('gun');
});

// ════════════════════════════════════════
//  掃碼模組
// ════════════════════════════════════════
let cameraStream = null;
let scanMode = 'gun';
let scanLoopId = null;
let scanCooldown = false;
let zxingBrowserLoaded = false;
let zxingLibLoaded = false;
let zxingLiveReader = null;

const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

// ── 模式切換 ──────────────────────────────────
function setScanMode(mode) {
  scanMode = mode;
  document.getElementById('btn-mode-camera').classList.toggle('active', mode === 'camera');
  document.getElementById('btn-mode-gun').classList.toggle('active', mode === 'gun');
  document.getElementById('gun-input-area').style.display = mode === 'gun' ? 'block' : 'none';
  if (mode === 'camera') {
    isIOS ? setupIOSMode() : startLiveCamera();
  } else {
    stopCamera();
    setTimeout(() => document.getElementById('barcode-field').focus(), 50);
  }
}

// ── iOS 拍照模式 ──────────────────────────────
function setupIOSMode() {
  document.getElementById('camera-container').style.display = 'none';
  document.getElementById('stop-camera-btn').style.display = 'none';
  document.getElementById('ios-capture-btn').style.display = 'none';
  setIOSStatus('⏳ 載入掃碼模組中，請稍候...');

  // ① 優先用 @zxing/browser，失敗備援 @zxing/library
  if (zxingBrowserLoaded || zxingLibLoaded) {
    showIOSReady(); return;
  }
  loadScript(
    'https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.5/umd/index.min.js',
    () => { zxingBrowserLoaded = true; showIOSReady(); },
    () => loadScript(
      'https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js',
      () => { zxingLibLoaded = true; showIOSReady(); },
      () => setIOSStatus('⚠ 掃碼模組載入失敗，請確認網路後重新整理')
    )
  );
}

function showIOSReady() {
  document.getElementById('ios-capture-btn').style.display = 'block';
  setIOSStatus('請點上方按鈕，對準條碼拍照');
}

function setIOSStatus(msg) {
  const el = document.getElementById('ios-status');
  el.textContent = msg;
  el.style.display = 'block';
}

function handleIOSCapture(e) {
  const file = e.target.files[0];
  if (!file) return;
  setIOSStatus('🔍 解析條碼中...');
  const preview = document.getElementById('ios-preview');
  const url = URL.createObjectURL(file);
  preview.src = url; preview.style.display = 'block';
  const img = new Image();
  img.onload = () => {
    URL.revokeObjectURL(url);
    // 多尺度嘗試提高辨識率
    const found = [1, 0.75, 0.5, 1.5].some(scale => {
      const canvas = document.getElementById('camera-canvas');
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      const result = decodeCanvas(canvas);
      if (result) { onBarcodeFound(result); return true; }
      return false;
    });
    if (!found) setIOSStatus('⚠ 未識別到條碼，請重拍（確保條碼清晰、置中、光線充足）');
    else setTimeout(() => { preview.style.display = 'none'; showIOSReady(); }, 2000);
  };
  img.onerror = () => setIOSStatus('⚠ 圖片讀取失敗，請重試');
  img.src = url;
  e.target.value = '';
}

// ① 統一解碼函式：優先 @zxing/browser，備援 @zxing/library
function decodeCanvas(canvas) {
  // @zxing/browser
  if (zxingBrowserLoaded && typeof ZXingBrowser !== 'undefined') {
    try {
      const reader = new ZXingBrowser.BrowserMultiFormatReader();
      const result = reader.decodeFromCanvas(canvas);
      return result ? result.getText() : null;
    } catch(e) { /* 繼續嘗試備援 */ }
  }
  // @zxing/library
  if (zxingLibLoaded && typeof ZXing !== 'undefined') {
    try {
      const hints = new Map();
      hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
        ZXing.BarcodeFormat.CODE_128, ZXing.BarcodeFormat.EAN_13,
        ZXing.BarcodeFormat.EAN_8,   ZXing.BarcodeFormat.CODE_39,
        ZXing.BarcodeFormat.UPC_A,   ZXing.BarcodeFormat.QR_CODE,
      ]);
      hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
      const reader = new ZXing.BrowserMultiFormatReader(hints);
      const src = new ZXing.HTMLCanvasElementLuminanceSource(canvas);
      const result = reader.decode(new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(src)));
      return result ? result.getText() : null;
    } catch(e) { return null; }
  }
  return null;
}

// ── 非 iOS 即時掃描模式 ───────────────────────
// ③ 改善相機啟動流程
function startLiveCamera() {
  const container = document.getElementById('camera-container');
  const stopBtn   = document.getElementById('stop-camera-btn');
  const banner    = document.getElementById('camera-result-banner');
  document.getElementById('ios-capture-btn').style.display = 'none';
  document.getElementById('ios-status').style.display = 'none';

  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    alert('此瀏覽器不支援相機，請改用掃碼槍模式'); setScanMode('gun'); return;
  }

  banner.textContent = '⏳ 開啟相機中...'; banner.style.display = 'block';
  container.style.display = 'block';

  // ③ 優先後鏡頭，失敗自動退回任意鏡頭
  const tryGetCamera = (constraints) =>
    navigator.mediaDevices.getUserMedia({ video: constraints, audio: false });

  tryGetCamera({ facingMode: { exact: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } })
    .catch(() => tryGetCamera({ facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }))
    .catch(() => tryGetCamera({ width: { ideal: 1280 }, height: { ideal: 720 } }))
    .then(stream => {
      cameraStream = stream;
      const video = document.getElementById('camera-video');
      video.srcObject = stream;
      video.style.display = 'block';
      stopBtn.style.display = 'block';

      // ③ 等 loadedmetadata 確認影像就緒再開始掃描
      video.onloadedmetadata = () => {
        video.play().then(() => {
          banner.textContent = '📷 對準條碼掃描中...';
          if ('BarcodeDetector' in window) {
            startWithBarcodeDetector(video);
          } else {
            startWithZXingLive(video);
          }
        }).catch(err => {
          banner.textContent = '⚠ 影像播放失敗：' + err.message;
        });
      };
    })
    .catch(err => {
      container.style.display = 'none';
      // ③ 明確的錯誤訊息
      const msgs = {
        NotAllowedError:  '相機權限被拒，請在瀏覽器設定中允許後重試',
        NotFoundError:    '找不到相機裝置，請確認裝置已連接',
        NotReadableError: '相機被其他應用程式佔用，請關閉後重試',
      };
      alert(msgs[err.name] || ('相機啟動失敗：' + err.message));
      setScanMode('gun');
    });
}

function stopCamera() {
  if (scanLoopId) { cancelAnimationFrame(scanLoopId); scanLoopId = null; }
  if (zxingLiveReader) { try { zxingLiveReader.reset(); } catch(e){} zxingLiveReader = null; }
  if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
  const video = document.getElementById('camera-video');
  if (video) { video.srcObject = null; video.style.display = 'none'; }
  document.getElementById('camera-container').style.display = 'none';
  document.getElementById('stop-camera-btn').style.display = 'none';
  document.getElementById('camera-result-banner').style.display = 'none';
  document.getElementById('ios-capture-btn').style.display = 'none';
  document.getElementById('ios-status').style.display = 'none';
  document.getElementById('ios-preview').style.display = 'none';
}

function onBarcodeFound(code) {
  if (scanCooldown || !code) return;
  scanCooldown = true;
  const banner = document.getElementById('camera-result-banner');
  const status = document.getElementById('ios-status');
  if (isIOS) status.textContent = '✓ 已掃描：' + code;
  else { banner.textContent = '✓ 已掃描：' + code; banner.style.display = 'block'; }
  document.getElementById('barcode-field').value = code;
  addProduct();
  setTimeout(() => {
    scanCooldown = false;
    if (!isIOS && cameraStream) banner.textContent = '📷 對準條碼掃描中...';
  }, 1500);
}

// 即時掃描：BarcodeDetector（Android Chrome 原生）
function startWithBarcodeDetector(video) {
  const detector = new BarcodeDetector({
    formats: ['code_128','ean_13','ean_8','code_39','upc_a','upc_e','qr_code']
  });
  const canvas = document.getElementById('camera-canvas');
  const ctx = canvas.getContext('2d');
  function loop() {
    if (!cameraStream) return;
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      canvas.width = video.videoWidth; canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      detector.detect(canvas)
        .then(r => { if (r.length > 0) onBarcodeFound(r[0].rawValue); })
        .catch(() => {});
    }
    scanLoopId = requestAnimationFrame(loop);
  }
  loop();
}

// ① 即時掃描：@zxing/browser 為主，@zxing/library 備援
function startWithZXingLive(video) {
  const banner = document.getElementById('camera-result-banner');
  banner.textContent = '⏳ 載入掃碼模組...';

  const tryZXingBrowser = (onFail) => {
    loadScript(
      'https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.5/umd/index.min.js',
      () => {
        zxingBrowserLoaded = true;
        banner.textContent = '📷 對準條碼掃描中...';
        try {
          zxingLiveReader = new ZXingBrowser.BrowserMultiFormatReader();
          zxingLiveReader.decodeFromVideoElement(video, (result) => {
            if (result) onBarcodeFound(result.getText());
          });
        } catch(e) { onFail(); }
      },
      onFail
    );
  };

  const tryZXingLib = () => {
    loadScript(
      'https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js',
      () => {
        zxingLibLoaded = true;
        banner.textContent = '📷 對準條碼掃描中...';
        try {
          const hints = new Map();
          hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
            ZXing.BarcodeFormat.CODE_128, ZXing.BarcodeFormat.EAN_13,
            ZXing.BarcodeFormat.EAN_8,   ZXing.BarcodeFormat.CODE_39,
            ZXing.BarcodeFormat.UPC_A,   ZXing.BarcodeFormat.QR_CODE,
          ]);
          hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
          zxingLiveReader = new ZXing.BrowserMultiFormatReader(hints);
          zxingLiveReader.decodeFromVideoDevice(null, video, (result) => {
            if (result) onBarcodeFound(result.getText());
          });
        } catch(e) { banner.textContent = '⚠ 掃碼啟動失敗，請改用掃碼槍模式'; }
      },
      () => { banner.textContent = '⚠ 掃碼模組載入失敗，請確認網路後重試'; }
    );
  };

  tryZXingBrowser(tryZXingLib);
}

// 工具：載入外部腳本
function loadScript(url, onSuccess, onFail) {
  const s = document.createElement('script');
  s.src = url;
  s.onload = onSuccess;
  s.onerror = onFail;
  document.head.appendChild(s);
}
</script>
